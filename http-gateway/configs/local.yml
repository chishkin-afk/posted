app:
  name: posted-http-gateway
  version: 0.0.1
  env: ${APP_ENV}

server:
  http:
    addr: localhost:8090
    tls:
      enable: false
      server_cert_path: ./certs/server.crt
      server_key_path: ./certs/server.key
  read_timeout: 2s
  write_timeout: 2s
  idle_timeout: 30s

grpc:
  auth_service:
    addr: ${AUTH_GRPC_ADDR}
    mtls:
      enable: true
      client_cert_path: ./certs/client.crt
      client_key_path: ./certs/client.key
  posts_service:
    addr: ${POSTS_GRPC_ADDR}
    mtls:
      enable: true
      client_cert_path: ./certs/client.crt
      client_key_path: ./certs/client.key